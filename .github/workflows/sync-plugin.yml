name: Sync task-manager-skill plugin

on:
  push:
    branches: [main]
    paths:
      - "task-manager-skill/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone plugin repo
        run: |
          git clone https://x-access-token:${{ secrets.PLUGIN_REPO_TOKEN }}@github.com/todase/task-manager-skill.git /tmp/plugin-repo

      - name: Copy files
        run: |
          cp -r task-manager-skill/. /tmp/plugin-repo/

      - name: Commit and push
        run: |
          cd /tmp/plugin-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes" || git commit -m "sync: update from task-manager main repo"
          git push
