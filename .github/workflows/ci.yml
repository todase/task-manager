name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        # DATABASE_URL is a placeholder — no Postgres service is running.
        # Next.js build succeeds as long as no route handler or server component
        # executes a Prisma query at build time. If that changes, add a
        # services: postgres: block and run `npx prisma migrate deploy` before this step.
        run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ci"
          AUTH_SECRET: "ci-placeholder-32-chars-exactly!!"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_CACHE_VERSION: "1"
